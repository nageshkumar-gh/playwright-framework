apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-tests
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: playwright
          image: pw-test:latest
          imagePullPolicy: Never
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "=== STEP 1: Running Playwright tests ===";
              npx playwright test;
              TEST_EXIT_CODE=$?
              echo "Playwright tests completed with exit code: $TEST_EXIT_CODE";

              echo "=== STEP 2: Checking if playwright-report exists locally ===";
              if [ -d "playwright-report" ]; then
                echo "SUCCESS: playwright-report directory exists in the container.";
                echo "Contents of local playwright-report:";
                ls -la playwright-report;
              else
                echo "WARNING: playwright-report directory does NOT exist locally!";
              fi

              echo "=== STEP 3: Checking if /shared volume is mounted ===";
              if [ -d "/shared" ]; then
                echo "SUCCESS: /shared volume mount is present.";
              else
                echo "ERROR: /shared volume mount is missing!";
              fi

              echo "=== STEP 4: Copying report to /shared/report ===";
              mkdir -p /shared/report;
              echo "Directory /shared/report created.";
              
              if cp -r playwright-report/* /shared/report/ 2>/dev/null; then
                echo "SUCCESS: Copied report files to /shared/report.";
              else
                echo "WARNING: No files copied (directory might be empty or missing).";
              fi

              echo "=== STEP 5: Verifying /shared/report contents ===";
              ls -la /shared/report;

              echo "=== STEP 6: Exiting container ===";
              exit $TEST_EXIT_CODE

          volumeMounts:
            - name: report-volume
              mountPath: /shared

          env:
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: playwright-secret
                  key: base_url
            - name: USERNAME
              valueFrom:
                secretKeyRef:
                  name: playwright-secret
                  key: username
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: playwright-secret
                  key: password

      volumes:
        - name: report-volume
          hostPath:
            path: /tmp/playwright-report
            type: DirectoryOrCreate