name: Playwright Tests on Kubernetes (Kind)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: docker build -t pw-test:latest .

      # 3. Install Kind
      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      # 4. Create cluster
      - name: Create Kind cluster
        run: kind create cluster

      # 5. Wait for cluster readiness
      - name: Wait for cluster readiness
        run: kubectl wait --for=condition=Ready nodes --all --timeout=120s

      # 6. Load Docker image into Kind
      - name: Load image into cluster
        run: kind load docker-image pw-test:latest

      # 7. Create Kubernetes secret
      - name: Create test secret
        run: |
          kubectl create secret generic playwright-secret \
            --from-literal=base_url=${{ secrets.BASE_URL }} \
            --from-literal=username=${{ secrets.USERNAME }} \
            --from-literal=password=${{ secrets.PASSWORD }}

      # 8. Run Kubernetes Job
      - name: Run Playwright Job
        run: |
          kubectl delete job playwright-tests --ignore-not-found
          kubectl apply -f pw-k8s-job.yaml

      # 9. Wait for completion (Now accurately tracks failures)
      - name: Wait for Job
        run: |
          kubectl wait --for=condition=complete job/playwright-tests --timeout=600s || \
          (kubectl wait --for=condition=failed job/playwright-tests --timeout=1s && exit 1)

      # 10. Debug on failure
      - name: Debug Pods
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl describe pod $(kubectl get pods -o name)
          kubectl logs $(kubectl get pods -o name) || true

      # 11. Fetch logs (optional visibility)
      - name: Fetch logs
        run: |
          POD_NAME=$(kubectl get pods --selector=job-name=playwright-tests -o jsonpath='{.items[0].metadata.name}')
          kubectl logs $POD_NAME

      # 12. Copy report from hostPath
      - name: Copy report from Kind node
        if: always() # CRITICAL: Run this step even if Step 9 fails
        run: |
          # 1. Fix permissions inside the Kind container so the runner can read it
          docker exec kind-control-plane chmod -R 777 /tmp/playwright-report
          
          # 2. Copy the explicit report folder out of the Kind node
          docker cp kind-control-plane:/tmp/playwright-report/report ./playwright-report || echo "No report found"

      # 13. Upload report
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() # CRITICAL: Upload the artifact regardless of test outcome
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 14. Cleanup
      - name: Cleanup cluster
        if: always()
        run: kind delete cluster