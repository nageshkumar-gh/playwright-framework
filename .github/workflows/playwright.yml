name: Playwright Tests (Docker)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: docker build -t pw-test .

      # 3. Run tests inside container
      - name: Run Playwright tests in Docker
        run: |
          docker run --rm \
            -e BASE_URL=${{ secrets.BASE_URL }} \
            -e USERNAME=${{ secrets.USERNAME }} \
            -e PASSWORD=${{ secrets.PASSWORD }} \
            pw-test

      # 4. (Optional) Copy report from container
      - name: Extract Playwright report
        run: |
          docker create --name temp pw-test
          docker cp temp:/app/playwright-report ./playwright-report || true
          docker rm temp

      # 5. Upload report
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30