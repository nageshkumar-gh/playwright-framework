name: Playwright Tests on Kubernetes (Kind)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Build Docker image
      - name: Build Docker image
        run: docker build -t pw-test:latest .

      # 3. Install Kind
      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      # 4. Create Kubernetes cluster
      - name: Create Kind cluster
        run: kind create cluster

      # 5. Wait for cluster readiness (IMPORTANT FIX)
      - name: Wait for cluster readiness
        run: kubectl wait --for=condition=Ready nodes --all --timeout=120s

      # 6. Load Docker image into Kind
      - name: Load image into cluster
        run: kind load docker-image pw-test:latest

      # 7. Create Kubernetes secret (test data)
      - name: Create test secret
        run: |
          kubectl create secret generic playwright-secret \
            --from-literal=base_url=${{ secrets.BASE_URL }} \
            --from-literal=username=${{ secrets.USERNAME }} \
            --from-literal=password=${{ secrets.PASSWORD }}

      # 8. Run Kubernetes Job
      - name: Run Playwright Job
        run: |
          kubectl delete job playwright-tests --ignore-not-found
          kubectl apply -f pw-k8s-job.yaml

      # 9. Check Pods (quick visibility)
      - name: Check Pods
        run: kubectl get pods -o wide --watch=false

      # 10. Wait for completion (handles success + failure)
      - name: Wait for Job
        run: |
          kubectl wait --for=condition=complete job/playwright-tests --timeout=600s || \
          kubectl wait --for=condition=failed job/playwright-tests --timeout=1s

      # 11. Debug if failure
      - name: Debug Pods
        if: failure()
        run: |
          echo "==== PODS ===="
          kubectl get pods -o wide

          echo "==== DESCRIBE POD ===="
          kubectl describe pod $(kubectl get pods -o name)

          echo "==== LOGS ===="
          kubectl logs $(kubectl get pods -o name) || true

      # 12. Fetch logs (always useful)
      - name: Fetch logs
        run: |
          POD_NAME=$(kubectl get pods --selector=job-name=playwright-tests -o jsonpath='{.items[0].metadata.name}')
          kubectl logs $POD_NAME

      # 13. Copy Playwright report from Pod
      - name: Copy Playwright report
        run: |
          POD_NAME=$(kubectl get pods --selector=job-name=playwright-tests -o jsonpath='{.items[0].metadata.name}')
          kubectl cp $POD_NAME:/app/playwright-report ./playwright-report || echo "No report found"

      # 14. Upload report
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # 15. Cleanup cluster (optional but clean)
      - name: Cleanup cluster
        if: always()
        run: kind delete cluster